<!doctype html>
<html>
  <head>
    <title>Birthday Surprise</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        margin: 0;
        height: 100vh;
        font-family: "Poppins", sans-serif;
        background-image: url("https://i.pinimg.com/originals/ac/e0/26/ace0262ace78ceba8f33a01cde239d4a.jpg");
        background-size: cover;
        background-position: center;
        overflow: hidden;
        text-align: center;
        color: #ff69b4;
      }

      .box {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.6);
        padding: 25px;
        border-radius: 15px;
        width: 90%;
        max-width: 320px;
        backdrop-filter: blur(10px);
        box-sizing: border-box;
      }

      input,
      button {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: none;
        font-size: 16px;
        margin-top: 10px;
        box-sizing: border-box;
      }

      button {
        background: #ff69b4;
        color: white;
        cursor: pointer;
      }

      #animationPage {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: black;
        z-index: 999;
      }

      .videoContainer {
        height: 100vh;
        aspect-ratio: 9 / 16;
        margin: auto;
        background: #f8fcfb;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      #bgVideo {
        width: 240%;
        height: 150%;
        transform: translateX(-2%);
      }
    </style>
  </head>

  <body>
    <div class="box" id="inputBox">
      <h2>Enter Date Jii 😏</h2>
      <input type="date" id="dateInput" />
      <button onclick="checkDate()">Enter</button>
      <p id="message"></p>
    </div>

    <div id="animationPage">
      <div class="videoContainer">
        <video id="bgVideo" playsinline>
          <source
            src="https://ik.imagekit.io/Vijen10/wish.mp4"
            type="video/mp4"
          />
        </video>
      </div>
    </div>

    <script>
      function checkDate() {
        let inputDate = document.getElementById("dateInput").value;
        let correctDate = "2026-04-06";

        if (inputDate === correctDate) {
          document.getElementById("inputBox").style.display = "none";
          document.getElementById("animationPage").style.display = "block";

          const video = document.getElementById("bgVideo");

          video.muted = false;
          video.volume = 1;
          video.currentTime = 0;

          const playPromise = video.play();

          if (playPromise !== undefined) {
            playPromise.catch(() => {
              video.muted = true;
              video.play();
            });
          }
        } else {
          document.getElementById("message").innerText =
            "Galat date 😜 phir try karo!";
        }
      }
    </script>
  </body>
</html>
